<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NIC Voice Agent</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='nic-logo.png') }}" />
    <style>
      :root {
        --bg: #f5f6f8;
        --panel: #ffffff;
        --panel-2: #f9fafb;
        --border: rgba(0, 0, 0, 0.08);
        --text: #151515;
        --muted: #6b7280;
        --accent: #15803d;
        --accent-2: #22c55e;
        --accent-3: #16a34a;
        --accent-4: #064e3b;
        --accent-soft: #dcfce7;
        --shadow: rgba(0, 0, 0, 0.15);
        --danger: #b42318;
        --ok: #107c41;
      }

      * { box-sizing: border-box; }

      html {
        background: transparent;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: transparent;
        color: var(--text);
        min-height: 100vh;
        overflow: hidden;
      }

      body.embed-frame {
        min-height: auto;
        width: 100vw;
        height: 100vh;
      }

      .launcher {
        position: fixed;
        right: 22px;
        bottom: 22px;
        width: 72px;
        height: 72px;
        border-radius: 0;
        border: none;
        background: transparent;
        padding: 0;
        box-shadow: none;
        cursor: pointer;
        z-index: 30;
        display: grid;
        place-items: center;
        overflow: visible;
        animation: launcherFloat 4.8s ease-in-out infinite;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }
      .launcher.hidden {
        opacity: 0;
        pointer-events: none;
        animation: none;
        transform: scale(0.9);
      }

      .launcher-shell {
        position: relative;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        background: transparent;
        isolation: isolate;
        transition: transform 0.28s ease, box-shadow 0.28s ease;
      }

      .launcher-shell::before {
        content: "";
        position: absolute;
        width: 56px;
        height: 56px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        background: radial-gradient(circle, rgba(67, 209, 125, 0.34) 0%, rgba(67, 209, 125, 0.14) 52%, rgba(67, 209, 125, 0) 78%);
        filter: blur(10px);
        z-index: -2;
        animation: iconHaloPulse 2.8s ease-in-out infinite;
      }

      .launcher-shell::after {
        content: "";
        position: absolute;
        width: 44px;
        height: 44px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0) 70%);
        pointer-events: none;
      }

      .launcher-rings,
      .launcher-rings::before,
      .launcher-rings::after {
        position: absolute;
        inset: 10px;
        border-radius: 999px;
        border: 1px solid rgba(67, 209, 125, 0.24);
        content: "";
      }

      .launcher-rings {
        animation: ringPulse 3s ease-out infinite;
      }

      .launcher-rings::before {
        inset: -8px;
        animation: ringPulse 3s ease-out infinite 0.65s;
      }

      .launcher-rings::after {
        inset: -24px;
        animation: ringPulse 3s ease-out infinite 1.3s;
      }

      .launcher-shell .call-mark {
        width: 40px;
        height: 40px;
        color: var(--accent);
        filter:
          drop-shadow(0 8px 16px rgba(8, 80, 33, 0.22))
          drop-shadow(0 0 3px rgba(255, 255, 255, 0.9));
      }

      .launcher:hover .launcher-shell,
      .launcher:focus-visible .launcher-shell {
        transform: translateY(-4px) scale(1.08);
      }

      .launcher:focus-visible {
        outline: none;
      }

      .launcher:focus-visible .launcher-shell {
        filter: drop-shadow(0 0 0 4px rgba(220, 252, 231, 0.95));
      }

      body.embed-frame .launcher {
        position: fixed !important;
        top: auto !important;
        right: 6px !important;
        bottom: 6px !important;
        left: auto !important;
        width: 72px;
        height: 72px;
        margin: 0;
      }

      .widget-wrap {
        position: fixed;
        right: 22px;
        bottom: 96px;
        width: min(320px, 90vw);
        z-index: 25;
        transform: translateY(18px);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: transform 0.25s ease, opacity 0.25s ease, visibility 0s linear 0.25s;
      }

      .widget-wrap.open {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition: transform 0.25s ease, opacity 0.25s ease;
      }

      body.embed-frame .widget-wrap {
        position: fixed !important;
        top: auto !important;
        right: 12px !important;
        bottom: 0 !important;
        left: auto !important;
        width: min(320px, calc(100vw - 24px));
      }

      body.embed-frame .widget-wrap.open {
        transform: none;
      }

      .widget {
        background: var(--panel);
        border-radius: 22px;
        box-shadow: 0 28px 60px var(--shadow);
        border: 1px solid var(--border);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-height: 100vh;
      }

      body.embed-frame .widget {
        max-height: 100vh;
      }

      body.embed-frame .widget-header {
        padding: 12px 14px;
      }

      body.embed-frame .widget-body {
        padding: 10px 12px 12px;
      }

      body.embed-frame .panel {
        padding: 10px;
        margin-bottom: 8px;
      }

      .widget-header {
        padding: 16px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background:
          radial-gradient(circle at top left, rgba(34, 197, 94, 0.14), transparent 42%),
          linear-gradient(135deg, #ecfdf3, #f8fffb);
        border-bottom: 1px solid var(--border);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid var(--border);
        display: grid;
        place-items: center;
        overflow: hidden;
        box-shadow: 0 12px 24px rgba(21, 128, 61, 0.18);
      }

      .call-mark {
        width: 24px;
        height: 24px;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .call-mark svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .brand h1 {
        margin: 0;
        font-size: 0.98rem;
      }

      .brand p {
        margin: 2px 0 0;
        font-size: 0.78rem;
        color: var(--muted);
      }

      .close {
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 0.9rem;
      }

      .widget-body {
        padding: 12px 14px 14px;
        background: var(--panel);
        overflow-y: auto;
      }
      .panel {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .panel h2 {
        margin: 0 0 6px;
        font-size: 0.72rem;
        letter-spacing: 0.22em;
        color: var(--muted);
      }

      .panel p {
        margin: 0;
        font-size: 0.94rem;
        line-height: 1.45;
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .panel-logo {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        box-shadow: 0 10px 20px rgba(21, 128, 61, 0.18);
      }

      .panel-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .call-row {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 10px;
        margin-top: 10px;
      }

      select,
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #fff;
        font-size: 0.95rem;
      }

      .call-btn {
        width: 100%;
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 12px 22px rgba(22, 163, 74, 0.25);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
      }

      .call-btn:hover,
      .call-btn:focus-visible {
        transform: translateY(-1px);
        box-shadow: 0 18px 26px rgba(22, 163, 74, 0.3);
        filter: saturate(1.05);
      }

      .call-btn:focus-visible {
        outline: 2px solid rgba(21, 128, 61, 0.22);
        outline-offset: 3px;
      }

      .call-btn .call-mark {
        width: 18px;
        height: 18px;
      }

      .fine {
        margin: 8px 0 0;
        font-size: 0.8rem;
        color: var(--muted);
      }

      .footer {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .branding {
        margin-top: 8px;
        display: flex;
        justify-content: center;
      }

      .branding-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: linear-gradient(135deg, #ecfdf3, #f8fffb);
        color: #166534;
        font-size: 0.68rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-weight: 600;
      }

      .ghost {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--muted);
        border-radius: 999px;
        padding: 10px 14px;
        cursor: pointer;
      }

      .status {
        margin-top: 8px;
        min-height: 18px;
        font-size: 0.85rem;
      }

      .status.error { color: var(--danger); }
      .status.ok { color: var(--ok); }

      .widget-wrap.open .widget {
        animation: widgetLift 0.34s ease;
      }

      .widget-wrap.open .panel {
        animation: panelReveal 0.42s ease both;
      }

      .widget-wrap.open .panel:nth-of-type(2) {
        animation-delay: 0.06s;
      }

      @keyframes launcherFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }

      @keyframes iconHaloPulse {
        0%, 100% {
          opacity: 0.6;
          transform: translate(-50%, -50%) scale(0.92);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.08);
        }
      }

      @keyframes ringPulse {
        0% {
          opacity: 0;
          transform: scale(0.9);
        }
        28% {
          opacity: 0.55;
        }
        100% {
          opacity: 0;
          transform: scale(1.08);
        }
      }

      @keyframes widgetLift {
        from {
          opacity: 0;
          transform: translateY(14px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes panelReveal {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        .widget-wrap {
          right: 12px;
          bottom: 86px;
          width: min(320px, calc(100vw - 24px));
        }

        .widget {
          max-height: 100vh;
        }

        .launcher {
          right: 12px;
          bottom: 12px;
        }
      }
    </style>
  </head>
  <body>
    <button class="launcher" id="launcher" type="button" aria-label="Open NIC voice agent">
      <span class="launcher-shell" aria-hidden="true">
        <span class="launcher-rings"></span>
        <span class="call-mark">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8.63 3.82c.47-.37 1.15-.34 1.58.09l1.67 1.67c.41.41.46 1.06.12 1.53L10.6 8.99c-.18.25-.19.58-.03.84.67 1.08 1.58 2.06 2.72 2.92.26.19.62.18.87-.02l1.75-1.37a1.24 1.24 0 0 1 1.56.08l1.91 1.64c.49.42.57 1.15.19 1.66l-1.22 1.62c-.62.83-1.72 1.2-2.72.92-2.03-.57-4.11-1.9-6.24-4.02-2.13-2.12-3.47-4.22-4.05-6.28-.29-.99.08-2.1.92-2.73l1.53-1.15Z" fill="currentColor"/>
          </svg>
        </span>
      </span>
    </button>

    <div class="widget-wrap" id="widgetWrap" aria-hidden="true">
      <div class="widget" role="dialog" aria-modal="true">
        <div class="widget-header">
          <div class="brand">
            <div class="logo">
              <img src="{{ url_for('static', filename='nic-logo.png') }}" alt="NIC logo" />
            </div>
            <div>
              <h1>NIC Voice Agent</h1>
              <p>Instant call demo</p>
            </div>
          </div>
          <button class="close" id="closeBtn" type="button">Close</button>
        </div>

        <div class="widget-body">
          <div class="panel">
            <div class="panel-head">
              <h2>AGENT PREVIEW</h2>
              <div class="panel-logo">
                <img src="{{ url_for('static', filename='nic-logo.png') }}" alt="NIC logo" />
              </div>
            </div>
            <p>Get quick help with NIC queries and support assistance</p>
          </div>

          <div class="panel">
            <h2>REQUEST A CALL</h2>
            <div class="call-row">
              <select id="country">
                <option value="+92">PK +92</option>
              </select>
              <input id="phone" type="tel" placeholder="Your phone number" autocomplete="tel" />
            </div>
            <button class="call-btn" id="callBtn" type="button">
              <span class="call-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M6.94 5.18a1.45 1.45 0 0 1 1.5-.36l2.1.7a1.46 1.46 0 0 1 .95 1.02l.34 1.54a1.46 1.46 0 0 1-.42 1.37l-1.1 1.07a13.14 13.14 0 0 0 5.17 5.17l1.07-1.1a1.46 1.46 0 0 1 1.37-.42l1.54.34a1.46 1.46 0 0 1 1.02.95l.7 2.1a1.45 1.45 0 0 1-.36 1.5l-1.18 1.18a2.91 2.91 0 0 1-2.82.77 18.59 18.59 0 0 1-9.98-5.21 18.59 18.59 0 0 1-5.21-9.98 2.91 2.91 0 0 1 .77-2.82l1.18-1.18Z" fill="currentColor"/>
                  <path d="M15.86 4.9a6 6 0 0 1 3.24 3.24" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                  <path d="M15.64 8.36a2.58 2.58 0 0 1 1 1" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
              </span>
              <span>Call me now</span>
            </button>
            <p class="fine">We will call you within seconds. Standard carrier rates may apply.</p>
            <div class="status" id="status"></div>
          </div>

          <div class="footer">
            <button class="ghost" id="cancelBtn" type="button">Close</button>
          </div>

          <div class="branding">
            <span class="branding-tag">Design by ALGONLP</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const widgetWrap = document.getElementById("widgetWrap");
      const launcher = document.getElementById("launcher");
      const closeBtn = document.getElementById("closeBtn");
      const cancelBtn = document.getElementById("cancelBtn");
      const callBtn = document.getElementById("callBtn");
      const phone = document.getElementById("phone");
      const country = document.getElementById("country");
      const statusEl = document.getElementById("status");
      const embeddedFrame = window.self !== window.top;

      if (embeddedFrame) {
        document.body.classList.add("embed-frame");
      }

      function postFrameState(state) {
        if (!embeddedFrame) {
          return;
        }

        window.parent.postMessage({ type: "nic-agent-frame-state", state }, "*");
      }

      function setStatus(text, ok = true) {
        statusEl.textContent = text;
        statusEl.className = "status " + (ok ? "ok" : "error");
      }

      function clearStatus() {
        statusEl.textContent = "";
        statusEl.className = "status";
      }

      function isE164(value) {
        return /^\+[1-9]\d{7,14}$/.test(value);
      }

      function normalizePhoneInput(value) {
        return (value || "").replace(/\D/g, "");
      }

      function openWidget() {
        postFrameState("open");
        widgetWrap.classList.add("open");
        widgetWrap.setAttribute("aria-hidden", "false");
        launcher.classList.add("hidden");
        clearStatus();
        phone.focus();
      }

      function closeWidget() {
        widgetWrap.classList.remove("open");
        widgetWrap.setAttribute("aria-hidden", "true");
        launcher.classList.remove("hidden");
        phone.value = "";
        clearStatus();
        postFrameState("closed");
      }

      async function placeCall() {
        const rawNumber = phone.value.trim();
        const normalizedNumber = normalizePhoneInput(rawNumber);
        const fullNumber = `${country.value}${normalizedNumber}`;
        const originalText = callBtn.innerHTML;
        let keepSuccessState = false;

        if (!isE164(fullNumber)) {
          setStatus("Enter a valid phone number", false);
          return;
        }

        callBtn.disabled = true;
        setStatus("Placing call...", true);

        try {
          const res = await fetch("/api/call", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              toNumber: normalizedNumber,
              countryCode: country.value,
            }),
          });
          let data = {};
          try {
            data = await res.json();
          } catch (_) {
            data = {};
          }
          if (!res.ok) {
            const errMsg = data.error || `Call failed (HTTP ${res.status})`;
            setStatus(errMsg, false);
          } else {
            setStatus("Call initiated successfully. The agent will call you shortly.", true);
            callBtn.innerHTML = "<span>Call Sent!</span>";
            keepSuccessState = true;
            setTimeout(() => {
              callBtn.innerHTML = originalText;
              callBtn.disabled = false;
            }, 3000);
          }
          console.log("Call Response:", data);
        } catch (err) {
          console.error("Error:", err);
          const errMsg = "Network error while calling";
          setStatus(errMsg, false);
        } finally {
          if (!keepSuccessState) {
            callBtn.innerHTML = originalText;
            callBtn.disabled = false;
          }
        }
      }

      launcher.addEventListener("click", openWidget);
      closeBtn.addEventListener("click", closeWidget);
      cancelBtn.addEventListener("click", closeWidget);
      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeWidget();
      });
      phone.addEventListener("keydown", (e) => {
        if (e.key === "Enter") placeCall();
      });
      callBtn.addEventListener("click", placeCall);
      window.addEventListener("message", (event) => {
        if (!event.data) return;
        if (event.data.type === "nic-agent-open") openWidget();
        if (event.data.type === "nic-agent-close") closeWidget();
      });
      postFrameState("closed");
    </script>
  </body>
</html>
